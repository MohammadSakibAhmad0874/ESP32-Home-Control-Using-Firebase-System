<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApnaGhar — Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Loading admin panel...</p>
    </div>

    <div class="dashboard" id="mainDashboard" style="display:none;">
        <div class="dash-header">
            <div>
                <h1>👑 Admin Panel</h1>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">My Device</a>
                <a href="admin.html" class="nav-link active">Admin</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
            <div class="device-status" style="flex-direction:column;align-items:flex-start;gap:4px;">
                <span style="color:var(--text-muted);font-size:0.8em;">TOTAL DEVICES</span>
                <span id="totalCount" style="font-size:1.8em;font-weight:700;">—</span>
            </div>
            <div class="device-status"
                style="flex-direction:column;align-items:flex-start;gap:4px;background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.2);">
                <span style="color:var(--text-muted);font-size:0.8em;">ONLINE</span>
                <span id="onlineCount" style="font-size:1.8em;font-weight:700;color:var(--accent-green);">—</span>
            </div>
            <div class="device-status"
                style="flex-direction:column;align-items:flex-start;gap:4px;background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2);">
                <span style="color:var(--text-muted);font-size:0.8em;">OFFLINE</span>
                <span id="offlineCount" style="font-size:1.8em;font-weight:700;color:var(--accent-red);">—</span>
            </div>
        </div>

        <!-- Make me admin button (first run) -->
        <div id="makeAdminSection" style="display:none;text-align:center;margin-bottom:16px;">
            <button class="btn btn-primary" onclick="makeMeAdmin()"
                style="background:linear-gradient(135deg,#f59e0b,#d97706);">
                👑 Make Me Admin (First Setup)
            </button>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <!-- Device list -->
        <div id="deviceList"></div>
    </div>

    <script src="app.js"></script>
    <script>
        requireAuth(init);

        async function init() {
            if (localStorage.getItem('hc_is_admin') !== '1') {
                document.getElementById('makeAdminSection').style.display = 'block';
            }

            try {
                const devices = await apiGet('/api/admin/devices');
                renderDevices(devices);
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
            } catch (err) {
                if (err.message && err.message.includes('403')) {
                    document.getElementById('makeAdminSection').style.display = 'block';
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('mainDashboard').style.display = 'block';
                } else {
                    document.getElementById('loadingOverlay').innerHTML = '<p style="color:#f87171;">❌ Error loading devices</p>';
                }
            }
        }

        async function makeMeAdmin() {
            const r = await apiPost('/api/admin/make-admin', {});
            if (r.success) {
                localStorage.setItem('hc_is_admin', '1');
                location.reload();
            } else {
                showError(r.detail || 'Failed');
            }
        }

        function renderDevices(devices) {
            const online = devices.filter(d => d.online).length;
            document.getElementById('totalCount').textContent = devices.length;
            document.getElementById('onlineCount').textContent = online;
            document.getElementById('offlineCount').textContent = devices.length - online;

            const list = document.getElementById('deviceList');
            if (!devices.length) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No devices registered yet.</p>';
                return;
            }

            list.innerHTML = devices.map(d => `
            <div style="background:var(--bg-card);border:1px solid ${d.online ? 'rgba(34,197,94,0.3)' : 'var(--border)'};
                        border-radius:16px;padding:20px;margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <div>
                        <strong style="font-size:1.1em;">${d.device_id}</strong>
                        <span style="color:var(--text-muted);margin-left:8px;">${d.owner_name}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:0.85em;color:${d.online ? 'var(--accent-green)' : 'var(--accent-red)'};">
                            ${d.online ? '🟢 Online' : '🔴 Offline'}
                        </span>
                        <button onclick="deleteDevice('${d.device_id}')"
                                style="background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);
                                       color:#f87171;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:0.8em;">
                            🗑️ Remove
                        </button>
                    </div>
                </div>
                <div style="font-size:0.82em;color:var(--text-muted);margin-bottom:10px;">
                    📧 ${d.email} &nbsp;|&nbsp; 🕐 Last seen: ${getTimeAgo(d.last_seen)} &nbsp;|&nbsp; 📍 ${d.ip_address || 'unknown IP'}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;">
                    ${Object.entries(d.relays || {}).map(([key, r]) => `
                    <div onclick="adminToggle('${d.device_id}','${key}',${r.state})"
                         style="cursor:pointer;background:${r.state ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.04)'};
                                border:1px solid ${r.state ? 'rgba(34,197,94,0.3)' : 'var(--border)'};
                                border-radius:10px;padding:6px 14px;font-size:0.85em;">
                        ${r.state ? '🟢' : '⚫'} ${r.name}
                    </div>`).join('')}
                </div>
            </div>`).join('');
        }

        async function adminToggle(deviceId, relayKey, currentState) {
            await apiPost(`/api/devices/${deviceId}/relay/${relayKey}`, { state: !currentState });
            const devices = await apiGet('/api/admin/devices');
            renderDevices(devices);
        }

        async function deleteDevice(deviceId) {
            if (!confirm(`Remove device ${deviceId}? This cannot be undone.`)) return;
            await apiDelete('/api/admin/devices/' + deviceId);
            const devices = await apiGet('/api/admin/devices');
            renderDevices(devices);
        }

        // Auto-refresh every 30 seconds
        setInterval(async () => {
            try {
                const devices = await apiGet('/api/admin/devices');
                renderDevices(devices);
            } catch (_) { }
        }, 30000);
    </script>
</body>

</html>
