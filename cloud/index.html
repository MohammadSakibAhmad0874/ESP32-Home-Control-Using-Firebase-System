<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeControl — Login</title>
    <meta name="description" content="Control your ESP32 Smart Home from anywhere in the world">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="icon">🏠</span>
                <h1>HomeControl</h1>
                <p>Self-hosted smart home — no Firebase, yours forever</p>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register Device</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Device ID</label>
                    <input type="text" id="loginDeviceId" placeholder="e.g. SH-001" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">🔑 Login to Dashboard</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="regName" placeholder="e.g. Ghosty" required>
                </div>
                <div class="form-group">
                    <label>New Device ID</label>
                    <input type="text" id="regDeviceId" placeholder="e.g. SH-001 (unique)" required>
                </div>
                <div class="form-group">
                    <label>Email (for account)</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Number of Switches</label>
                    <input type="number" id="regSwitches" placeholder="4" value="4" min="1" max="8" required>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">📱 Register New Device</button>
            </form>
        </div>
    </div>

    <script src="app.js?v=2"></script>
    <script>
        // If already logged in, go directly to dashboard
        if (getToken()) {
            window.location.href = '/cloud/dashboard.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
            clearMessages();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Logging in...';
            clearMessages();

            const deviceId = document.getElementById('loginDeviceId').value.trim().toUpperCase();
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_id: deviceId, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Login failed');
                    btn.disabled = false;
                    btn.textContent = '🔑 Login to Dashboard';
                    return;
                }

                setToken(data.token);
                setDeviceId(data.device_id);
                localStorage.setItem('hc_name', data.name);
                localStorage.setItem('hc_is_admin', data.is_admin ? '1' : '0');
                window.location.href = '/cloud/dashboard.html';
            } catch (err) {
                showError('Cannot connect to server. Is it running?');
                btn.disabled = false;
                btn.textContent = '🔑 Login to Dashboard';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Registering...';
            clearMessages();

            const name = document.getElementById('regName').value.trim();
            const deviceId = document.getElementById('regDeviceId').value.trim().toUpperCase();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const numSwitches = parseInt(document.getElementById('regSwitches').value) || 4;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, device_id: deviceId, email, password, num_switches: numSwitches })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.detail || 'Registration failed');
                    btn.disabled = false;
                    btn.textContent = '📱 Register New Device';
                    return;
                }

                setToken(data.token);
                setDeviceId(data.device_id);
                localStorage.setItem('hc_name', name);
                localStorage.setItem('hc_is_admin', '0');
                showSuccess('✅ Device registered! Device ID: ' + deviceId + '. Redirecting...');
                setTimeout(() => { window.location.href = '/cloud/dashboard.html'; }, 1500);
            } catch (err) {
                showError('Cannot connect to server. Is it running?');
                btn.disabled = false;
                btn.textContent = '📱 Register New Device';
            }
        }
    </script>
</body>

</html>
