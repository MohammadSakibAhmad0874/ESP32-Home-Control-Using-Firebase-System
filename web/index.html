<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeControl — Login</title>
    <meta name="description" content="Self-hosted smart home control system. Login or register your device.">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrap {
            width: 100%;
            max-width: 440px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .names-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .names-grid .form-group {
            margin-bottom: 0;
        }

        #switchNamesContainer {
            margin-top: 8px;
        }

        .loader-btn {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="center-page">
        <div class="login-wrap">
            <div class="card">
                <!-- Brand -->
                <div class="brand">
                    <span class="brand-icon">🏠</span>
                    <span class="brand-name">HomeControl</span>
                </div>
                <p class="brand-tagline">Self-hosted smart home — no Firebase, yours forever</p>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register Device</button>
                </div>

                <!-- Alert -->
                <div class="alert" id="alertBox"></div>

                <!-- ── Login Panel ── -->
                <div class="tab-panel active" id="panel-login">
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginDeviceId">Device ID</label>
                            <input type="text" id="loginDeviceId" placeholder="e.g. SH-001" autocomplete="username"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password"
                                autocomplete="current-password" required>
                        </div>
                        <button class="btn btn-primary" type="submit" id="loginBtn">
                            🔑 Login to Dashboard
                        </button>
                    </form>
                </div>

                <!-- ── Register Panel ── -->
                <div class="tab-panel" id="panel-register">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label for="regName">Your Name</label>
                            <input type="text" id="regName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="regDeviceId">Device ID <span
                                    style="color:var(--text-3);font-weight:400">(unique, e.g. SH-002)</span></label>
                            <input type="text" id="regDeviceId" placeholder="SH-002" required>
                        </div>
                        <div class="form-group">
                            <label for="regEmail">Email</label>
                            <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="regPassword">Password</label>
                            <input type="password" id="regPassword" placeholder="Min 6 characters"
                                autocomplete="new-password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="regNumSwitches">Number of Switches</label>
                            <select id="regNumSwitches" onchange="updateNameFields()">
                                <option value="2">2</option>
                                <option value="4" selected>4</option>
                                <option value="6">6</option>
                                <option value="8">8</option>
                            </select>
                        </div>

                        <div id="switchNamesContainer">
                            <label style="margin-bottom:8px;display:block">Switch Names <span
                                    style="color:var(--text-3);font-weight:400">(optional)</span></label>
                            <div class="names-grid" id="namesGrid"></div>
                        </div>

                        <hr class="divider">
                        <button class="btn btn-primary" type="submit" id="registerBtn">
                            📡 Register New Device
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Redirect if already logged in
        if (getToken()) {
            window.location.href = isAdmin() ? '/admin.html' : '/dashboard.html';
        }

        const DEFAULT_SWITCH_NAMES = ['Living Room', 'Bedroom', 'Kitchen', 'Fan',
            'Switch 5', 'Switch 6', 'Switch 7', 'Switch 8'];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
            hideAlert(document.getElementById('alertBox'));
        }

        function updateNameFields() {
            const n = parseInt(document.getElementById('regNumSwitches').value, 10);
            const grid = document.getElementById('namesGrid');
            grid.innerHTML = '';
            for (let i = 0; i < n; i++) {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `
          <label>Switch ${i + 1}</label>
          <input type="text" class="sw-name" placeholder="${DEFAULT_SWITCH_NAMES[i] || 'Switch ' + (i + 1)}">
        `;
                grid.appendChild(div);
            }
        }

        // Initialize name fields
        updateNameFields();

        async function handleLogin(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alertBox');
            const btn = document.getElementById('loginBtn');
            const deviceId = document.getElementById('loginDeviceId').value.trim().toUpperCase();
            const password = document.getElementById('loginPassword').value;

            hideAlert(alertEl);
            btn.disabled = true;
            btn.innerHTML = '<span class="loader-btn"></span> Logging in…';

            try {
                const data = await apiPost('/api/auth/login', { device_id: deviceId, password });
                saveAuth(data);
                window.location.href = data.is_admin ? '/admin.html' : '/dashboard.html';
            } catch (err) {
                showAlert(alertEl, err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '🔑 Login to Dashboard';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const alertEl = document.getElementById('alertBox');
            const btn = document.getElementById('registerBtn');

            const name = document.getElementById('regName').value.trim();
            const device_id = document.getElementById('regDeviceId').value.trim().toUpperCase();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const num_switches = parseInt(document.getElementById('regNumSwitches').value, 10);
            const swInputs = [...document.querySelectorAll('.sw-name')];
            const switch_names = swInputs.map((el, i) =>
                el.value.trim() || DEFAULT_SWITCH_NAMES[i] || `Switch ${i + 1}`
            );

            hideAlert(alertEl);
            btn.disabled = true;
            btn.innerHTML = '<span class="loader-btn"></span> Registering…';

            try {
                const data = await apiPost('/api/auth/register', {
                    name, device_id, email, password, num_switches, switch_names
                });
                saveAuth(data);
                window.location.href = '/dashboard.html';
            } catch (err) {
                showAlert(alertEl, err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '📡 Register New Device';
            }
        }
    </script>
</body>

</html>
